# explicit project name so containers/volumes/images are named consistently
# regardless of the checkout directory
name: engram

services:
  neo4j:
    image: neo4j:5.26-community
    container_name: engram-neo4j
    ports:
      - "7474:7474"   # browser UI
      - "7687:7687"   # bolt
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-engram}
      # the zero-config default password ("engram") is shorter than Neo4j 5.x's
      # 8-char minimum; relax it for the local dev DB (set a strong NEO4J_PASSWORD
      # in .env for anything exposed)
      NEO4J_dbms_security_auth__minimum__password__length: "4"
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
      # Graph Data Science (community) for personalized PageRank proximity
      NEO4J_PLUGINS: '["graph-data-science"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: base
    container_name: engram-api
    ports:
      - "8088:8088"
    env_file:
      - path: .env
        required: false
    environment:
      # inside the compose network the database is reached by service name;
      # overrides any NEO4J_URI from .env
      NEO4J_URI: bolt://neo4j:7687
    extra_hosts:
      # lets containers reach endpoints running on the docker host
      - "host.docker.internal:host-gateway"
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  # PostgreSQL + pgvector backend (store_backend=pgvector). Optional: the
  # default neo4j backend does not need it. Image ships the pgvector extension.
  postgres:
    image: pgvector/pgvector:pg16
    container_name: engram-postgres
    profiles: ["pgvector", "test"]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-engram}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-engram}
      POSTGRES_DB: ${POSTGRES_DB:-engram}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-engram} -d ${POSTGRES_DB:-engram}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # test runner: docker compose run --rm tests
  # starts both backends so the neo4j + pgvector integration tests both run
  tests:
    build:
      context: .
      target: test
    profiles: ["test"]
    env_file:
      - path: .env
        required: false
    environment:
      NEO4J_URI: bolt://neo4j:7687
      POSTGRES_DSN: postgresql://engram:engram@postgres:5432/engram
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
