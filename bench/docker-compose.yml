# Isolated benchmark stack (separate project so it never touches the dev store).
# Run:  docker compose -f bench/docker-compose.yml run --rm runner
name: engrambench

services:
  db:
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: neo4j/benchmark
      # GDS enables engram's personalized-PageRank proximity (used by the
      # multi-hop benchmark; the BEIR runner uses decay and ignores it)
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  runner:
    build:
      context: ..
      dockerfile: bench/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      # point engram at the throwaway benchmark DB
      NEO4J_URI: bolt://db:7687
      NEO4J_PASSWORD: benchmark
      # BGE-M3 is 1024-dim (engram's default embedder); no generative LLM, so
      # metadata + HyDE off and the content channel is the only vector channel
      EMBEDDING_DIM: "1024"
      METADATA_EXTRACTOR: none
      SUMMARY_CHANNEL_ENABLED: "false"
      KEYWORDS_CHANNEL_ENABLED: "false"
      HYDE_ENABLED: "false"
      GRAPH_PROXIMITY_MODE: decay
      RERANKER_STRATEGY: local
      # benchmark depth: retrieve + rerank deep, no autocut/diversity trimming
      TOP_K_PER_INDEX: "100"
      RERANK_TOP_K: "100"
      FINAL_TOP_K: "100"
      AUTOCUT_ENABLED: "false"
      MMR_LAMBDA: "1.0"
      SCHEMA_GUARD_MODE: "off"
    volumes:
      # cache HuggingFace model downloads + the dataset across runs
      - hf_cache:/root/.cache/huggingface
      - bench_data:/data

  # multi-hop benchmark (HotpotQA) — engram runs its FULL graph pipeline:
  #   docker compose -f bench/docker-compose.yml run --rm multihop
  multihop:
    build:
      context: ..
      dockerfile: bench/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    command: ["python", "-m", "bench.multihop"]
    environment:
      NEO4J_URI: bolt://db:7687
      NEO4J_PASSWORD: benchmark
      EMBEDDING_DIM: "1024"
      # YAKE keywords (no LLM) build the shared-keyword graph; all channels on;
      # GDS personalized-PageRank proximity = engram's HippoRAG-style mechanism
      METADATA_EXTRACTOR: yake
      HYDE_ENABLED: "false"
      GRAPH_PROXIMITY_MODE: ppr
      RERANKER_STRATEGY: local
      TOP_K_PER_INDEX: "100"
      SEED_COUNT: "10"
      RERANK_TOP_K: "50"
      FINAL_TOP_K: "50"
      AUTOCUT_ENABLED: "false"
      MMR_LAMBDA: "1.0"
      SCHEMA_GUARD_MODE: "off"
      BENCH_MULTIHOP_N: "500"
      BENCH_RERANK_DEPTH: "50"
    volumes:
      - hf_cache:/root/.cache/huggingface
      - bench_data:/data

volumes:
  hf_cache:
  bench_data:
